# path to the task data directory
data_dir: null
#dataset_dir: null

# either provide a path to a plaintext file describing the task
desc_file: null
generate_report: False
# or provide the task goal (and optionally evaluation information) as arguments
goal: null
eval: null
# generate_report: True

log_dir: ./logs/run
log_level: INFO
workspace_dir: ./workspaces/run
faiss_dir: ./models/gte-small
use_grade_server: false
skill_file: null  # path to user's skill.md file
grade_server_port: 5005
mle_data_dir: null  # path to MLEBench data directory

# whether to unzip any archives in the data directory
preprocess_data: True
# whether to copy the data to the workspace directory (otherwise it will be symlinked)
# copying is recommended to prevent the agent from accidentally modifying the original data
copy_data: True

exp_name: null # a random experiment name will be generated if not provided

ablation_prob: 0.1

cpu_number: 40
start_cpu_id: 0

# settings for code execution
exec:
  timeout: 32400
  agent_file_name: runfile.py
  format_tb_ipython: False

# LLM settings for final report from journal
report:
  model: qwen3-max
  temp: 0.7

# agent hyperparams
agent:
  api_key: null  # pass via CLI: agent.api_key=sk-xxx or env LEAF_API_KEY
  base_url: null  # pass via CLI: agent.base_url=https://... or env LEAF_BASE_URL
  # how many improvement iterations to run
  steps: 400
  # total time available to agent
  time_limit: 86400 # 12 hrs (purely informational, implementation is user's resp)
  # whether to instruct the agent to use CV (set to 1 to disable)
  k_fold_validation: 3
  # whether to instruct the agent to generate a prediction function
  expose_prediction: False
  # whether to provide the agent with a preview of the data
  data_preview: True
  # whether to convert system messages into user messages
  # whether to obfuscate that we're doing kaggle
  obfuscate: False
  # check submission format
  check_format: True
  # for mcts
  save_all_submission: True
  # steerable reasoning, only works when your deepseek api support client.completions.create()
  steerable_reasoning: True
    # ablation study step
  ablation_step: 3

  # LLM settings for coding
  draft:
    model: qwen3.7-max
    temp: 1

  debug:
    model: qwen3.7-max
    temp: 1


  # LLM settings for evaluating program output / tracebacks
  feedback:
    model: qwen3.7-max
    temp: 1

  cheap:
    model: qwen3.7-max
    temp: 0.6
  # hyperparameters for the tree search
  search:
    back_debug_depth: 3
    max_debug_depth: 20
    ablation_improve_depth: 5
    debug_prob: 0.2

    topk_best: 4
    explosion_prob: 0.3
    crossover_prob: 0.3
    min_sparks: 1
    max_sparks: 5
    total_sparks: 10
    
    
    num_drafts: 3
    num_bugs: 1
    num_improves: 3
    invalid_metric_upper_bound: 100
    metric_improvement_threshold: 0.0001
    max_improve_failure: 3
    parallel_search_num: 3

    # Forced explode: break out of stagnation by exploding the best UCT node
    forced_explode:
      enabled: true
      patience: 20             # consecutive steps with no best-metric improvement before triggering
      temperature: 1        # higher than normal explode (0.3-1.0) for radical diversity
      amplitude: 0.95          # near-max radius for aggressive reconstruction
      num_sparks: 5            # moderate spark count for broad exploration
      cooldown: 15             # minimum steps between two forced explodes to avoid thrashing
      stagnation_threshold_pct: 5.0  # improvement must exceed this % of best metric to reset stagnation counter

  decay:
    decay_type: piecewise       # decay_type
    exploration_constant: 1.414        # exploration constant
    lower_bound: 0.5                # Lower exploration limit to prevent values from being too small
    linear_decay:
      alpha: 0.01
    exponential_decay:
      gamma: 0.99
    piecewise_decay:
      alpha: 0.01
      phase_ratios: [0.3, 0.7]
    dynamic_piecewise_decay:
      alpha: 0.01
      phase_ratios: [0.85, 1]





